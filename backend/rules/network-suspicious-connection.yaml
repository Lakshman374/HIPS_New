rule:
  id: network-suspicious-connection
  name: Suspicious Network Connection Detected
  description: Detects when a program on this computer connects to a port commonly used by attackers for remote control, data theft, or backdoor communications.
  enabled: true
  severity: high
  category: Intrusion

  conditions:
    event_type: network_connection
    platform:
      - windows
      - linux

    any:
      - field: dst_port
        operator: in
        value: [4444, 4445, 5555, 6666, 6667, 7777, 8888, 9999, 1337, 31337, 12345, 54321, 3333, 5588, 14433, 14444]

  actions:
    - type: alert
      priority: high
      message: "Suspicious outbound connection by {process_name} to {dst_ip}:{dst_port}"

    - type: log

  metadata:
    author: CHIPS Security Team
    created: "2026-06-18"
    tags:
      - network
      - c2
      - suspicious-port
    references:
      - https://attack.mitre.org/techniques/T1571/
