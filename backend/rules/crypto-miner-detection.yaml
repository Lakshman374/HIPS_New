rule:
  id: crypto-miner-detection
  name: Cryptocurrency Miner Detection
  description: Detects cryptocurrency mining programs running on the system, which attackers secretly install on servers to use the computing power and electricity for their own financial gain.
  enabled: true
  severity: high
  category: Impact
  conditions:
    event_type: process_create
    platform:
    - linux
    - windows
    any:
    - field: process_name
      operator: in
      value:
      - xmrig
      - minerd
      - cpuminer
      - cgminer
      - bfgminer
      - ethminer
      - t-rex
      - nbminer
    - field: process_cmdline
      operator: contains
      value: stratum+tcp://
    - field: process_cmdline
      operator: contains
      value: stratum+ssl://
    - field: process_cmdline
      operator: contains
      value: pool.minexmr.com
    - field: process_cmdline
      operator: contains
      value: xmrig
    - field: process_cmdline
      operator: regex
      value: (?i)--pool|--mining-pool|--algo\s+rx
  actions:
  - type: alert
    priority: high
    message: 'Cryptocurrency miner detected! Process: {process_name}, Command: {process_cmdline}'
  - type: block_process
    target: process_pid
  - type: log
  metadata:
    author: user
    references: []
    tags: []
