rule:
  id: registry-lsa-modification
  name: LSA Security Provider Modification
  description: "Detects changes to the LSA registry key \u2014 attackers modify Security\
    \ Support Providers or Authentication Packages here to load credential-stealing\
    \ DLLs on every boot"
  enabled: true
  severity: critical
  category: credential_access
  conditions:
    event_type: registry_change
    platform:
    - windows
    all:
    - field: registry_key
      operator: regex
      value: (?i)HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa
    - field: registry_operation
      operator: in
      value:
      - value_create
      - value_modify
  actions:
  - type: alert
    priority: critical
    message: "CRITICAL: LSA key modified \u2014 possible credential-theft DLL injection:\
      \ {registry_key} \u2192 {registry_value} = {registry_data}"
  - type: log
  metadata:
    author: CHIPS Security Team
    created: '2026-05-09'
    references:
    - https://attack.mitre.org/techniques/T1547/005/
    - https://attack.mitre.org/techniques/T1556/002/
    tags:
    - credential-access
    - lsa
    - security-provider
    - registry
    - windows
