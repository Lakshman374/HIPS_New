rule:
  id: registry-ifeo-debugger-hijack
  name: Image File Execution Options Debugger Hijack
  description: "Detects Debugger value being set under IFEO for any executable \u2014\
    \ this causes the attacker's process to launch instead of the target every time\
    \ it is started (e.g. replacing taskmgr, sethc, osk)"
  enabled: false
  severity: high
  category: persistence
  conditions:
    event_type: registry_change
    platform:
    - windows
    all:
    - field: registry_key
      operator: regex
      value: (?i)HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File
        Execution Options
    any:
    - field: registry_value
      operator: equals
      value: Debugger
    - field: registry_operation
      operator: equals
      value: key_create
  actions:
  - type: alert
    priority: high
    message: "IFEO hijack detected \u2014 Debugger entry in Image File Execution Options:\
      \ {registry_key} = {registry_data}"
  - type: log
  metadata:
    author: CHIPS Security Team
    created: '2026-05-09'
    references:
    - https://attack.mitre.org/techniques/T1546/012/
    tags:
    - persistence
    - ifeo
    - debugger-hijack
    - accessibility
    - registry
    - windows
