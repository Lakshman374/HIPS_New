rule:
  id: "port-scanning-detection"
  name: "Port Scanning / Reconnaissance Detection"
  description: "Detects when scanning tools such as nmap or masscan are used to probe the network and discover open ports, which is often the first step taken by an attacker."
  enabled: true
  severity: "high"
  category: "Reconnaissance"

  conditions:
    event_type: "process_create"
    platform:
      - "linux"
      - "windows"

    any:
      - field: "process_name"
        operator: "in"
        value: ["nmap", "masscan", "zmap", "rustscan", "arp-scan"]

      - field: "process_cmdline"
        operator: "contains"
        value: "nmap"

      - field: "process_cmdline"
        operator: "contains"
        value: "masscan"

  actions:
    - type: "alert"
      priority: "high"
      message: "Port scanning tool detected: {process_name} — Command: {process_cmdline}"

    - type: "block_process"
      target: "process_pid"

    - type: "log"

  metadata:
    author: "CHIPS Security Team"
    created: "2025-05-06"
    tags: ["reconnaissance", "port-scan", "nmap", "datacentre"]
    references:
      - "https://attack.mitre.org/techniques/T1046/"
