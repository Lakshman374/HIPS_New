rule:
  id: "data-exfiltration-curl-wget"
  name: "Suspicious Data Exfiltration via curl/wget"
  description: "Detects when data transfer tools such as curl or wget are used to send or upload data to outside servers, which may indicate unauthorized data theft from the system."
  enabled: true
  severity: "high"
  category: "Exfiltration"

  conditions:
    event_type: "process_create"
    platform:
      - "linux"
      - "windows"

    any:
      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)curl.+(-d|--data|--data-binary|--upload-file|-T|--form|-F)"

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)wget.+(--post-data|--post-file)"

      - field: "process_cmdline"
        operator: "regex"
        value: '(?i)curl.+(-X\s+POST|-X\s+PUT)'

  actions:
    - type: "alert"
      priority: "high"
      message: "Possible data exfiltration detected via curl/wget: {process_cmdline}"

    - type: "log"

  metadata:
    author: "CHIPS Security Team"
    created: "2025-05-06"
    tags: ["exfiltration", "curl", "wget", "data-theft", "datacentre"]
    references:
      - "https://attack.mitre.org/techniques/T1048/"
